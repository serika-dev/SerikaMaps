services:
  # ── Production (all-in-one) ──────────────────────────────────
  serika-maps:
    build: .
    container_name: serika-maps
    ports:
      - "3000:3000"
      - "4001:4001"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    profiles:
      - production

  # ── Development ──────────────────────────────────────────────
  api:
    image: oven/bun:1-alpine
    container_name: serika-maps-api
    working_dir: /app
    command: bun --watch src/index.ts
    ports:
      - "4001:4001"
    volumes:
      - ./api:/app
      - api-modules:/app/node_modules
    environment:
      - NODE_ENV=development
    profiles:
      - dev

  web:
    image: oven/bun:1-alpine
    container_name: serika-maps-web
    working_dir: /app
    command: sh -c "bun install && bun run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - web-modules:/app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      - api
    profiles:
      - dev

volumes:
  api-modules:
  web-modules:
