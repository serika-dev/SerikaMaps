# ─── Serika Maps — Docker Compose ────────────────────────────
# Reads from .env in the project root.
# See .env.example for available variables.

services:
  # ── Production (all-in-one) ──────────────────────────────────
  serika-maps:
    build: 
      context: .
      args:
        - NEXT_PUBLIC_API_URL=${PUBLIC_URL_API:-http://localhost:4001}
    container_name: serika-maps
    ports:
      - "3000:3000"
      - "4001:4001"
    environment:
      - NODE_ENV=production
      - PUBLIC_URL=${PUBLIC_URL:-http://localhost:3000}
      - PUBLIC_URL_API=${PUBLIC_URL_API:-http://localhost:4001}
      - NEXT_PUBLIC_API_URL=${PUBLIC_URL_API:-http://localhost:4001}
    restart: unless-stopped

  # ── Development ──────────────────────────────────────────────
  api:
    image: oven/bun:1-alpine
    container_name: serika-maps-api
    working_dir: /app
    command: bun --watch src/index.ts
    ports:
      - "4001:4001"
    volumes:
      - ./api:/app
      - api-modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - PUBLIC_URL=${PUBLIC_URL:-http://localhost:3000}
      - PUBLIC_URL_API=${PUBLIC_URL_API:-http://localhost:4001}
    profiles:
      - dev

  web:
    image: oven/bun:1-alpine
    container_name: serika-maps-web
    working_dir: /app
    command: sh -c "bun install && bun run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - web-modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=${PUBLIC_URL_API:-http://localhost:4001}
    depends_on:
      - api
    profiles:
      - dev

volumes:
  api-modules:
  web-modules:
